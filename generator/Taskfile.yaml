version: '3'

silent: true

dotenv:
  - ops/.env

tasks:
  default:
    desc: "Default"
    cmds:
      - task --list

  init:
    desc: "Initialize environment"
    cmds:
      - cp ./ops/.env.dist ./ops/.env || true
      - docker compose -f ops/compose.yaml run --rm cv composer install

  up:
    desc: "Start the application"
    cmds:
      - task: init
      - docker compose -f ops/compose.yaml up {{.CLI_ARGS}}

  run:
    desc: "Run application (foreground)"
    cmds:
      - task: init
      - docker compose -f ops/compose.yaml run --rm cv sh

  console:
    desc: "Run Symfony console command"
    cmds:
      - docker compose -f ops/compose.yaml run --rm cv php bin/console {{.CLI_ARGS}}

  export:
    desc: "Export CV → ../<name>.pdf"
    vars:
      PDF_NAME:
        sh: python3 -c "import json; d=json.load(open('data/cv.json')); print(d['profil']['name'].lower().replace(' ','_'))"
    cmds:
      - task: init
      - docker compose -f ops/compose.yaml up -d cv
      - |
        until curl -sf http://localhost:${HTTP_PORT:-8456} > /dev/null; do
          echo "Waiting for CV service..."
          sleep 1
        done
      - docker compose -f ops/compose.yaml run --rm
          -e CV_URL=http://cv:8000
          -e OUTPUT=/output/{{.PDF_NAME}}.pdf
          -e PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
          -v "$(pwd)/..:/output"
          exporter
          sh -c "npm install --prefix /script --omit=dev && node /script/export.js"
      - echo "Exported → ../{{.PDF_NAME}}.pdf"
      - curl -sf http://localhost:${HTTP_PORT:-8456} -o ../index.html
      - echo "Exported → ../index.html"
      - cp -r app/public/logos ../logos
      - echo "Copied → ../logos/"
      - docker compose -f ops/compose.yaml down exporter
