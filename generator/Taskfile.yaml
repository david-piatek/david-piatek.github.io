version: '3'

silent: true

dotenv:
  - ops/.env

tasks:
  default:
    desc: "Default"
    cmds:
      - task --list

  init:
    desc: "Initialize environment"
    cmds:
      - cp ./ops/.env.dist ./ops/.env || true
      - docker compose -f ops/compose.yaml run --rm cv composer install

  up:
    desc: "Start the application"
    cmds:
      - task: init
      - docker compose -f ops/compose.yaml up {{.CLI_ARGS}}

  run:
    desc: "Run application (foreground)"
    cmds:
      - task: init
      - docker compose -f ops/compose.yaml run --rm cv sh

  console:
    desc: "Run Symfony console command"
    cmds:
      - docker compose -f ops/compose.yaml run --rm cv php bin/console {{.CLI_ARGS}}

  export:
    desc: "Export CV → ../index.html + data/cv.pdf"
    cmds:
      - task: init
      - docker compose -f ops/compose.yaml up -d
      - curl -sf --retry 10 --retry-delay 1 --retry-connrefused http://localhost:${HTTP_PORT:-8456}/ -o ../index.html
      - docker compose -f ops/compose.yaml wait exporter
      - curl -sf http://localhost:${HTTP_PORT:-8456}/export -o data/cv.pdf
      - echo "Exported → ../index.html + data/cv.pdf"
